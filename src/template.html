<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
</head>
<body>
    <div id="main">
        <button class="test" id="addPrj">Add project</button>
        <button class="test" id="addToDo">Add task</button>
        <button class="test" id="printList">Console list</button>
    </div>

    <dialog action="" id="newProject">
        <form id="collectPrj">
            <div>
                <p>Fill this form to add a new Project:</p>
                <label for="addProject">Project name:</label>
                <input type="text" id="addProject" name="project">
                
                <label for="addColor">Project Color:</label>
                <input type="color" id="addColor" name="prjColor">
            </div>

            <div id="formButtons">
                <button type="submit" class="doStuff" id="submitPrjForm">Submit</button>
                <button class="doStuff" id="cancelPrjForm">Cancel</button>
            </div>
        </form>
    </dialog>

    <dialog action="" id="newToDo">
        <form id="collect">
            <div>
                <p>Fill this form to add a new To Do:</p>
                <label for="selectProject">Choose a pet:</label>
                <select id="selectProject" name="project" >
                    <option value="">--Please choose an option--</option>
                </select>
                
                <label for="addTask">Task:</label>
                <input type="text" id="addTask" name="task">
                
                <label for="addDue">Due date:</label>
                <input type="date" id="addDue" name="date">
                
                <label for="addPriority">Priority:</label>
                <input type="text" id="addPriority" name="priority">

                <label for="addNotes">Notes:</label>
                <input type="text" id="addNotes" name="notes">
            </div>

            <div id="formButtons">
                <button type="submit" class="doStuff" id="submitForm">Submit</button>
                <button class="doStuff" id="cancelForm">Cancel</button>
            </div>
        </form>
    </dialog>
</body>
</html>
